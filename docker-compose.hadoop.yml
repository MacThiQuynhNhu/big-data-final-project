version: "3.8"

# =====================================================================
# PHƯƠNG ÁN B — Cụm Hadoop đầy đủ (HDFS + YARN) + Spark trên Docker
# Dùng image big-data-europe (bde2020) — bộ image chuẩn cho học thuật.
# Chạy:  docker compose -f docker-compose.hadoop.yml up -d
#
# Giao diện demo phân tán:
#   HDFS NameNode UI : http://localhost:9870  (thấy 2 DataNode)
#   YARN ResourceMgr : http://localhost:8088  (thấy NodeManager)
#   Spark Master UI  : http://localhost:8080  (thấy 2 worker)
#
# RAM nặng (~9-10GB). Nên CHẠY RIÊNG, không bật cùng NiFi/Kafka.
# Ingestion chạy trước bằng docker-compose.yml, xong rồi mới bật cụm này.
# =====================================================================

services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    restart: always
    ports: ["9870:9870", "9000:9000"]
    environment:
      - CLUSTER_NAME=bigdata
    env_file: ["./hadoop.env"]
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
      - ./data:/data            # để nạp dữ liệu local vào HDFS

  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode1
    restart: always
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    env_file: ["./hadoop.env"]
    volumes: ["hadoop_datanode1:/hadoop/dfs/data"]

  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode2
    restart: always
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    env_file: ["./hadoop.env"]
    volumes: ["hadoop_datanode2:/hadoop/dfs/data"]

  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: resourcemanager
    restart: always
    ports: ["8088:8088"]
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode1:9864 datanode2:9864"
    env_file: ["./hadoop.env"]

  nodemanager1:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: nodemanager1
    restart: always
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode1:9864 datanode2:9864 resourcemanager:8088"
    env_file: ["./hadoop.env"]

  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    container_name: historyserver
    restart: always
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode1:9864 datanode2:9864 resourcemanager:8088"
    env_file: ["./hadoop.env"]
    volumes: ["hadoop_historyserver:/hadoop/yarn/timeline"]

  # ---------------- Spark đọc/ghi HDFS ----------------
  spark-master:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    container_name: spark-master
    depends_on: [namenode]
    ports: ["8080:8080", "7077:7077"]
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    volumes:
      - ./data:/data
      - ./notebooks:/app

  spark-worker-1:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker-1
    depends_on: [spark-master]
    ports: ["8081:8081"]
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    volumes: ["./data:/data"]

  spark-worker-2:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker-2
    depends_on: [spark-master]
    ports: ["8082:8081"]
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    volumes: ["./data:/data"]

volumes:
  hadoop_namenode:
  hadoop_datanode1:
  hadoop_datanode2:
  hadoop_historyserver:
