version: "3.8"

# =====================================================================
# PHƯƠNG ÁN A — Cụm Spark Standalone (master + 2 worker) trên Docker
# Kèm luôn NiFi + Kafka + Postgres để chạy end-to-end trong 1 file.
# Chạy:  docker compose -f docker-compose.spark.yml up -d
# Spark Master UI: http://localhost:8080  (sẽ thấy 2 worker đăng ký)
# =====================================================================

services:
  postgres:
    image: postgres:15
    container_name: erp-postgres
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp123
      POSTGRES_DB: erp
    volumes: ["pgdata:/var/lib/postgresql/data"]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on: [zookeeper]
    ports: ["9092:9092", "29092:29092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  nifi:
    image: apache/nifi:1.23.2
    container_name: nifi
    ports: ["8443:8443"]
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: bigdataproject2026
    volumes: ["./data:/opt/nifi/nifi-current/ingest"]

  # ---------------- Cụm Spark ----------------
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"   # Web UI của master
      - "7077:7077"   # cổng submit job
    volumes:
      - ./data:/data
      - ./notebooks:/opt/work

  spark-worker-1:
    image: apache/spark:3.5.1
    container_name: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077 --cores 2 --memory 2g
    depends_on: [spark-master]
    ports: ["8081:8081"]
    volumes:
      - ./data:/data
      - ./notebooks:/opt/work

  spark-worker-2:
    image: apache/spark:3.5.1
    container_name: spark-worker-2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077 --cores 2 --memory 2g
    depends_on: [spark-master]
    ports: ["8082:8081"]
    volumes:
      - ./data:/data
      - ./notebooks:/opt/work

volumes:
  pgdata:
