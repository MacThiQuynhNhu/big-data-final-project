<g class="purple"><rect x="160" y="504" width="360" height="56" rx="8" stroke-width="0.5"/><text class="th" x="340" y="526" text-anchor="middle" dominant-baseline="central">Dashboard BI</text><text class="ts" x="340" y="544" text-anchor="middle" dominant-baseline="central">Superset · Power BI · Grafana</text></g>
