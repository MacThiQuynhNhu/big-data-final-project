<g class="teal"><rect x="360" y="324" width="230" height="56" rx="8" stroke-width="0.5"/><text class="th" x="475" y="346" text-anchor="middle" dominant-baseline="central">Spark MLlib</text><text class="ts" x="475" y="364" text-anchor="middle" dominant-baseline="central">Dự báo · phân cụm · tương quan</text></g>

