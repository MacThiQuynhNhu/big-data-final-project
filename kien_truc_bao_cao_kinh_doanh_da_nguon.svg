<svg width="100%" viewBox="0 0 680 595" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Kiến trúc tổng hợp báo cáo kinh doanh đa nguồn</title>
<desc>Luồng dữ liệu từ 4 nguồn POS, ERP, CRM, kho hàng qua NiFi, Kafka, Spark SQL và MLlib, lưu vào HDFS/Hive và trực quan hóa trên dashboard BI.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
text{font-family:'Segoe UI',Arial,sans-serif}
.th{font-size:14px;font-weight:500}
.ts{font-size:12px}
.arr{stroke:#888780;stroke-width:1.5;fill:none}
.gray rect{fill:#F1EFE8;stroke:#5F5E5A}.gray .th{fill:#2C2C2A}.gray .ts{fill:#5F5E5A}
.coral rect{fill:#FAECE7;stroke:#993C1D}.coral .th{fill:#4A1B0C}.coral .ts{fill:#993C1D}
.teal rect{fill:#E1F5EE;stroke:#0F6E56}.teal .th{fill:#04342C}.teal .ts{fill:#0F6E56}
.purple rect{fill:#EEEDFE;stroke:#534AB7}.purple .th{fill:#26215C}.purple .ts{fill:#534AB7}
</style>
</defs>

<g class="gray"><rect x="43" y="50" width="135" height="56" rx="8" stroke-width="0.5"/><text class="th" x="110" y="72" text-anchor="middle" dominant-baseline="central">POS</text><text class="ts" x="110" y="90" text-anchor="middle" dominant-baseline="central">Bán lẻ · JSON</text></g>
<g class="gray"><rect x="196" y="50" width="135" height="56" rx="8" stroke-width="0.5"/><text class="th" x="263" y="72" text-anchor="middle" dominant-baseline="central">ERP</text><text class="ts" x="263" y="90" text-anchor="middle" dominant-baseline="central">Tài chính · CSV</text></g>
<g class="gray"><rect x="349" y="50" width="135" height="56" rx="8" stroke-width="0.5"/><text class="th" x="416" y="72" text-anchor="middle" dominant-baseline="central">CRM</text><text class="ts" x="416" y="90" text-anchor="middle" dominant-baseline="central">Khách hàng · API</text></g>
<g class="gray"><rect x="502" y="50" width="135" height="56" rx="8" stroke-width="0.5"/><text class="th" x="569" y="72" text-anchor="middle" dominant-baseline="central">Kho hàng</text><text class="ts" x="569" y="90" text-anchor="middle" dominant-baseline="central">Tồn kho · Excel</text></g>

<line x1="110" y1="106" x2="225" y2="148" class="arr" marker-end="url(#arrow)"/>
