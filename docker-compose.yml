version: "3.8"

services:
  # ---------- ERP nguồn: cơ sở dữ liệu quan hệ ----------
  postgres:
    image: postgres:15
    container_name: erp-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp123
      POSTGRES_DB: erp
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ---------- Hàng đợi tin nhắn ----------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # ---------- Thu thập / làm sạch / biến đổi ----------
  nifi:
    image: apache/nifi:1.23.2
    container_name: nifi
    ports:
      - "8443:8443"
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: bigdataproject2026
    volumes:
      - ./data:/opt/nifi/nifi-current/ingest

  # ---------- Spark SQL + MLlib qua Jupyter ----------
  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: jupyter-spark
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: bigdata
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data

volumes:
  pgdata:
