<svg width="100%" viewBox="0 0 680 525" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Kiến trúc big data thống nhất (chuẩn)</title>
<desc>Nguồn qua NiFi vào Kafka; nhánh speed (Spark Streaming → Postgres) và nhánh batch (HDFS → Hive chi tiết → Spark → Hive marts); Airflow lập lịch batch; Grafana gộp cả hai.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
text{font-family:'Segoe UI',Arial,sans-serif}
.th{font-size:14px;font-weight:500}.ts{font-size:12px}
.arr{stroke:#888780;stroke-width:1.5;fill:none}
.gray rect{fill:#F1EFE8;stroke:#5F5E5A}.gray .th{fill:#2C2C2A}.gray .ts{fill:#5F5E5A}
.coral rect{fill:#FAECE7;stroke:#993C1D}.coral .th{fill:#4A1B0C}.coral .ts{fill:#993C1D}
.teal rect{fill:#E1F5EE;stroke:#0F6E56}.teal .th{fill:#04342C}.teal .ts{fill:#0F6E56}
.purple rect{fill:#EEEDFE;stroke:#534AB7}.purple .th{fill:#26215C}.purple .ts{fill:#534AB7}
.green rect{fill:#EAF3DE;stroke:#3B6D11}.green .th{fill:#173404}.green .ts{fill:#3B6D11}
.amber rect{fill:#FAEEDA;stroke:#BA7517}.amber .th{fill:#412402}.amber .ts{fill:#854F0B}
</style>
</defs>

<g class="gray"><rect x="120" y="34" width="440" height="44" rx="8" stroke-width="0.5"/><text class="th" x="340" y="50" text-anchor="middle" dominant-baseline="central">Nguồn dữ liệu — 5 hệ thống (omnichannel)</text><text class="ts" x="340" y="67" text-anchor="middle" dominant-baseline="central">OFFLINE: POS(api,hóa đơn)·ERP(db) — ONLINE: E-commerce(db) — Kho tổng(db)·CRM(api)</text></g>
<line x1="340" y1="78" x2="340" y2="90" class="arr" marker-end="url(#arrow)"/>

<g class="coral"><rect x="140" y="92" width="400" height="40" rx="8" stroke-width="0.5"/><text class="th" x="340" y="108" text-anchor="middle" dominant-baseline="central">Apache NiFi</text><text class="ts" x="340" y="123" text-anchor="middle" dominant-baseline="central">thu thập · làm sạch · tách dòng hóa đơn (Jolt)</text></g>
<line x1="340" y1="132" x2="340" y2="146" class="arr" marker-end="url(#arrow)"/>

<g class="coral"><rect x="140" y="148" width="400" height="42" rx="8" stroke-width="0.5"/><text class="th" x="340" y="165" text-anchor="middle" dominant-baseline="central">Apache Kafka — Event Bus</text><text class="ts" x="340" y="181" text-anchor="middle" dominant-baseline="central">topic: sales-report-clean · inventory-events</text></g>
<line x1="265" y1="190" x2="150" y2="213" class="arr" marker-end="url(#arrow)"/>
<line x1="415" y1="190" x2="445" y2="213" class="arr" marker-end="url(#arrow)"/>

<text class="ts" x="130" y="206" text-anchor="middle" fill="#0F6E56">SPEED · real-time</text>
<text class="ts" x="450" y="206" text-anchor="middle" fill="#534AB7">BATCH · định kỳ</text>

<g class="teal"><rect x="25" y="216" width="210" height="44" rx="8" stroke-width="0.5"/><text class="th" x="130" y="233" text-anchor="middle" dominant-baseline="central">Spark Streaming</text><text class="ts" x="130" y="249" text-anchor="middle" dominant-baseline="central">xử lý real-time</text></g>
<line x1="130" y1="260" x2="130" y2="274" class="arr" marker-end="url(#arrow)"/>
<g class="gray"><rect x="25" y="276" width="210" height="44" rx="8" stroke-width="0.5"/><text class="th" x="130" y="293" text-anchor="middle" dominant-baseline="central">PostgreSQL</text><text class="ts" x="130" y="309" text-anchor="middle" dominant-baseline="central">rt_thongke · rt_canhbao</text></g>

<g class="gray"><rect x="335" y="216" width="230" height="42" rx="8" stroke-width="0.5"/><text class="th" x="450" y="232" text-anchor="middle" dominant-baseline="central">HDFS — Data Lake</text><text class="ts" x="450" y="248" text-anchor="middle" dominant-baseline="central">/lake/transactions · /lake/inventory</text></g>
<line x1="450" y1="258" x2="450" y2="272" class="arr" marker-end="url(#arrow)"/>
<g class="purple"><rect x="335" y="274" width="230" height="42" rx="8" stroke-width="0.5"/><text class="th" x="450" y="290" text-anchor="middle" dominant-baseline="central">Hive — bảng chi tiết</text><text class="ts" x="450" y="306" text-anchor="middle" dominant-baseline="central">sales_report · inventory · dim_*</text></g>
<line x1="450" y1="316" x2="450" y2="330" class="arr" marker-end="url(#arrow)"/>
<g class="teal"><rect x="335" y="332" width="230" height="42" rx="8" stroke-width="0.5"/><text class="th" x="450" y="348" text-anchor="middle" dominant-baseline="central">Spark SQL + MLlib</text><text class="ts" x="450" y="364" text-anchor="middle" dominant-baseline="central">phân tích · dự báo · phân cụm</text></g>
<line x1="450" y1="374" x2="450" y2="388" class="arr" marker-end="url(#arrow)"/>
<g class="purple"><rect x="335" y="390" width="230" height="42" rx="8" stroke-width="0.5"/><text class="th" x="450" y="406" text-anchor="middle" dominant-baseline="central">Hive — kết quả (marts)</text><text class="ts" x="450" y="422" text-anchor="middle" dominant-baseline="central">bc_* : báo cáo đã phân tích</text></g>

<g class="amber"><rect x="575" y="308" width="100" height="50" rx="8" stroke-width="0.5"/><text class="th" x="625" y="326" text-anchor="middle" dominant-baseline="central">Airflow</text><text class="ts" x="625" y="343" text-anchor="middle" dominant-baseline="central">lập lịch</text></g>
<line x1="575" y1="345" x2="566" y2="350" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>

<g class="green"><rect x="170" y="456" width="340" height="44" rx="8" stroke-width="0.5"/><text class="th" x="340" y="473" text-anchor="middle" dominant-baseline="central">Dashboard / BI (Grafana)</text><text class="ts" x="340" y="489" text-anchor="middle" dominant-baseline="central">gộp real-time + báo cáo batch</text></g>
<line x1="130" y1="320" x2="275" y2="454" class="arr" marker-end="url(#arrow)"/>
<line x1="450" y1="432" x2="400" y2="454" class="arr" marker-end="url(#arrow)"/>

<g class="amber"><rect x="25" y="350" width="210" height="48" rx="8" stroke-width="0.5"/><text class="th" x="130" y="367" text-anchor="middle" dominant-baseline="central">san_pham — giá vốn (dim)</text><text class="ts" x="130" y="384" text-anchor="middle" dominant-baseline="central">nối KHO ↔ TÀI CHÍNH (COGS)</text></g>
<line x1="235" y1="368" x2="333" y2="300" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>
</svg>
