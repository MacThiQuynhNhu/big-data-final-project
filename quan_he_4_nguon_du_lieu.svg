<svg width="100%" viewBox="0 0 680 470" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Quan hệ giữa 4 nguồn dữ liệu</title>
<desc>POS và ERP là dữ liệu giao dịch nối nhau qua txn_id; CRM nối qua customer_id; kho hàng nối qua store_id và product_id.</desc>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
text{font-family:'Segoe UI',Arial,sans-serif}
.th{font-size:14px;font-weight:500}.ts{font-size:12px}.tk{font-size:12px;font-weight:500}
.lk{stroke:#888780;stroke-width:1;fill:none;stroke-dasharray:4 3}
.gray rect{fill:#F1EFE8;stroke:#5F5E5A}.gray .th{fill:#2C2C2A}.gray .ts{fill:#5F5E5A}
.teal rect{fill:#E1F5EE;stroke:#0F6E56}.teal .th{fill:#04342C}.teal .ts{fill:#0F6E56}
.coral rect{fill:#FAECE7;stroke:#993C1D}.coral .th{fill:#4A1B0C}.coral .ts{fill:#993C1D}
.key{fill:#26215C}
</style></defs>

<text class="ts" x="40" y="28" fill="#5F5E5A">Giao dịch (transaction)</text>
<text class="ts" x="430" y="28" fill="#5F5E5A">Tra cứu (master data)</text>

<g class="teal"><rect x="40" y="40" width="240" height="120" rx="8" stroke-width="0.5"/>
<text class="th" x="60" y="62">POS · JSON</text>
<text class="ts" x="60" y="84">txn_id</text>
<text class="ts" x="60" y="102">store_id · product_id</text>
<text class="ts" x="60" y="120">qty · Doanh_Thu · Ngay</text>
<text class="ts" x="60" y="140" fill="#993C1D">(tên cột bẩn → cần làm sạch)</text></g>

<g class="teal"><rect x="40" y="200" width="240" height="120" rx="8" stroke-width="0.5"/>
<text class="th" x="60" y="222">ERP · CSV → Postgres</text>
<text class="ts" x="60" y="244">txn_id</text>
<text class="ts" x="60" y="262">store_id · region</text>
<text class="ts" x="60" y="280">revenue · cost · txn_date</text>
<text class="ts" x="60" y="300" fill="#993C1D">(2% thiếu cost → cần loại bỏ)</text></g>

<g class="gray"><rect x="430" y="40" width="210" height="96" rx="8" stroke-width="0.5"/>
<text class="th" x="450" y="62">CRM · JSON</text>
<text class="ts" x="450" y="84">customer_id</text>
<text class="ts" x="450" y="102">customer_name</text>
<text class="ts" x="450" y="120">segment · region</text></g>

<g class="gray"><rect x="430" y="224" width="210" height="96" rx="8" stroke-width="0.5"/>
<text class="th" x="450" y="246">Kho hàng · Excel</text>
<text class="ts" x="450" y="268">store_id · product_id</text>
<text class="ts" x="450" y="286">stock_qty</text>
<text class="ts" x="450" y="304">reorder_level</text></g>

<line x1="160" y1="160" x2="160" y2="200" class="lk" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
<text class="tk key" x="170" y="184">txn_id</text>

<line x1="280" y1="100" x2="430" y2="92" class="lk" marker-end="url(#arrow)"/>
<text class="tk key" x="300" y="84">(customer_id)</text>

<line x1="280" y1="270" x2="430" y2="272" class="lk" marker-end="url(#arrow)"/>
<text class="tk key" x="300" y="262">store_id · product_id</text>

<text class="ts" x="40" y="360" fill="#5F5E5A">Khóa nối: txn_id gắn POS↔ERP · customer_id gắn giao dịch↔CRM · (store_id, product_id) gắn giao dịch↔kho</text>
<text class="ts" x="40" y="384" fill="#5F5E5A">Spark SQL JOIN 4 nguồn này lại để có bức tranh đầy đủ: ai mua, ở đâu, hàng gì, còn tồn bao nhiêu.</text>
</svg>
